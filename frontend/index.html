<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Escolar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="decorative-ribbon"></div>
            <div class="login-header">
                
                <h1>Gestión Escolar</h1>
                <p>Sistema de Calificaciones </p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label> Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@escuela.edu" required>
                </div>
                <div class="input-group">
                    <label> Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn"> Iniciar sesión</button>
            </form>
            <p class="demo-hint"> Demo: admin@escuela.edu / contraseña: admin123<br>
            profesor@escuela.edu / cualquier<br>
            estudiante@escuela.edu / cualquier</p>
           
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
