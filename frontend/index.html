<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Escolar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="decorative-ribbon"></div>
            <div class="login-header">
                <h1>Gestión Escolar</h1>
                <p>Sistema de Calificaciones</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@escuela.edu" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Iniciar sesión</button>
            </form>
            
            <!-- NUEVO: Enlace para recuperar contraseña -->
            <div style="text-align: center; margin-top: 20px;">
                <a href="#" onclick="showRecoveryModal()" style="color: var(--gold); font-size: 13px; font-family: 'Cinzel', serif; text-decoration: none;">
                    <i class="fas fa-key"></i> ¿Olvidaste tu contraseña?
                </a>
            </div>
            
        </div>
    </div>

       <!-- MODAL RECUPERAR CONTRASEÑA CORREGIDO -->
    <div id="recoveryModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <button type="button" class="close" onclick="closeRecoveryModal()">&times;</button>
            <h3><i class="fas fa-key"></i> Recuperar Contraseña</h3>
           <form id="recoveryForm">
                <div id="step1">
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> Número de Identificación</label>
                        <input type="text" id="recoveryIdentificacion" placeholder="Ej: 1234567890" required>
                    </div>
                    <button type="button" class="login-btn" onclick="checkUserAndLoadQuestions()" style="width:100%; margin-top:10px;">
                        <i class="fas fa-search"></i> Verificar usuario
                    </button>
                </div>
                <div id="step2" style="display: none;">
                    <div id="preguntaRecuperacion"></div>
                    <div class="input-group" style="margin-top: 15px;">
                        <label><i class="fas fa-pen"></i> Tu respuesta</label>
                        <input type="text" id="respuestaSeguridad" placeholder="Escribe tu respuesta aquí" required>
                    </div>
                    <div class="input-group" style="margin-top: 15px;">
                        <label><i class="fas fa-lock"></i> Nueva Contraseña</label>
                        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Confirmar Nueva Contraseña</label>
                        <input type="password" id="confirmNewPassword" placeholder="Repite la nueva contraseña" required>
                    </div>
                    <button type="submit" class="login-btn" style="width:100%; margin-top:15px;">
                        <i class="fas fa-save"></i> Cambiar Contraseña
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
