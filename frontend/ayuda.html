<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda — Gestión Escolar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600;700;900&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/ayuda.css?v=3.0">
</head>
<body>
    <div class="ayuda-container">
        <header class="ayuda-header">
            <button class="btn-volver" onclick="volverAlPanel()"><i class="fas fa-arrow-left"></i> Volver</button>
            <h1><i class="fas fa-circle-question"></i> Centro de Ayuda</h1>
            <p>Encuentra respuestas rápidas a las preguntas más comunes sobre el sistema.</p>
        </header>

        <div class="ayuda-search">
            <input type="text" id="ayudaSearch" placeholder="Buscar en la ayuda...">
        </div>

        <main id="ayudaContent" class="ayuda-content"></main>
    </div>

    <script src="js/ayuda.js"></script>
</body>
</html>
